name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Go quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Check formatting and module metadata
        run: |
          make fmt-check
          make tidy-check

      - name: Validate Protobuf sources and generated code
        run: |
          buf lint
          make generate-check

      - name: Run static analysis and tests
        run: |
          make vet
          make test-race

      - name: Build binaries
        run: make build
